{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-6 mb-4">
        <img src="/static/uploads/{{ product.image_filename }}" class="img-fluid rounded-4 shadow-lg">
    </div>
    <div class="col-md-6">
        <h1 class="display-4">{{ product.name }}</h1>
        <!-- Звёзды и отзывы полностью убраны -->
        <p class="mt-3 fs-5">{{ product.description }}</p>
        <h2 class="price display-5">{{ product.price }} ₽
            {% if product.old_price %}<span class="old-price fs-4">{{ product.old_price }} ₽</span>{% endif %}
        </h2>
        <p>В наличии: <strong>{{ product.stock }}</strong> шт.</p>
        <a href="/cart/add/{{ product.id }}" class="btn btn-primary btn-big me-3"><i class="fas fa-cart-plus"></i> В корзину</a>
        <a href="/catalog/" class="btn btn-outline-danger btn-big">Назад</a>
    </div>
</div>
{% endblock %}
